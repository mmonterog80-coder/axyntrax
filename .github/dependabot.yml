# ============================================================
# 🤖 SKILL: Dependabot-Automation
# ============================================================
version: 2
updates:
  # ── npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      # Group minor + patch updates to reduce noise
      next-ecosystem:
        patterns: ['next', 'react', 'react-dom', '@types/react*']
        update-types: ['minor', 'patch']
      supabase-ecosystem:
        patterns: ['@supabase/*']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    labels:
      - 'dependencies'
      - 'automated'
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'

  # ── GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    groups:
      github-actions:
        patterns: ['*']
        update-types: ['minor', 'patch']
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci(deps)'

  # ── Docker
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'chore(docker)'
