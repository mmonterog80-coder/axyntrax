# ============================================================
# 👁️ SKILL: Advanced-Branching + Preview-Deployments
# ============================================================
name: 👁️ PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    name: 🔍 Preview Deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: 🚀 Deploy Preview to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: true

      - name: 🧪 Run Preview Smoke Tests
        run: |
          URL="${{ steps.deploy.outputs.preview-url }}"
          echo "Testing preview at: $URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health")
          echo "Health: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: 💬 Comment Results
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview-url }}';
            const body = [
              '## 🚀 Preview Deployment Ready!',
              '',
              `| Resource | URL |`,
              `|:---------|:----|`,
              `| 🌐 Preview | [Open Preview](${url}) |`,
              `| 🏥 Health | [/api/health](${url}/api/health) |`,
              '',
              '### 📊 Checklist',
              '- [x] Build successful',
              '- [x] Health check passed',
              '- [ ] Manual QA review',
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
