# ============================================================
# 🚀 SKILL: Actions-Workflow-Expert + OIDC-Cloud-Integration
#           + Environments-Protection + Graphql-Api-Master
# ============================================================
name: 🚀 Anti-Gravity Multi-Platform Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Code Quality Gate
  # ──────────────────────────────────────────────
  quality-gate:
    name: 🔍 Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔎 Type Check
        run: npm run type-check

      - name: 🧹 Lint
        run: npm run lint

      - name: 🧪 Unit Tests
        run: npm test -- --reporter=github-actions

      - name: 🏗️ Build Check
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

  # ──────────────────────────────────────────────
  # JOB 2: Deploy Vercel
  # ──────────────────────────────────────────────
  deploy-vercel:
    name: ⚫ Deploy → Vercel
    runs-on: ubuntu-latest
    needs: quality-gate
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ steps.deploy.outputs.url }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: 🚀 Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
          working-directory: ./

      - name: 📊 Comment deployment URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Vercel Preview**: ${{ steps.deploy.outputs.url }}`
            })

  # ──────────────────────────────────────────────
  # JOB 3: Deploy Supabase Migrations
  # ──────────────────────────────────────────────
  deploy-supabase:
    name: 🟢 Deploy → Supabase
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🔗 Link Supabase Project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 🗄️ Run Migrations
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: 🔧 Deploy Edge Functions
        run: |
          supabase functions deploy hello-edge
          supabase functions deploy cron-cleanup
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ──────────────────────────────────────────────
  # JOB 4: Deploy Railway
  # ──────────────────────────────────────────────
  deploy-railway:
    name: 🔴 Deploy → Railway
    runs-on: ubuntu-latest
    needs: [quality-gate, deploy-supabase]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: 📦 Install Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy to Railway
        run: railway up --service api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ──────────────────────────────────────────────
  # JOB 5: Post-Deploy Smoke Tests
  # ──────────────────────────────────────────────
  smoke-tests:
    name: 🧪 Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-vercel, deploy-railway]
    steps:
      - uses: actions/checkout@v4

      - name: 🏥 Health Check — Vercel
        run: |
          URL="${{ needs.deploy-vercel.outputs.url || secrets.NEXT_PUBLIC_APP_URL }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health")
          echo "Health status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: 📊 Core Web Vitals Check
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          budgetPath: ./lighthouse-budget.json
          uploadArtifacts: true
