version: '3.8'

services:
  core_api:
    build:
      context: .
      dockerfile: Dockerfile.core
    ports:
      - "8080:8080"
    restart: always
    volumes:
      - ./core:/app/core
      - ./axyntrax-hud:/app/axyntrax-hud
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - axyntrax-net

  hud:
    build:
      context: .
      dockerfile: Dockerfile.hud
    ports:
      - "3002:3002"
    restart: always
    networks:
      - axyntrax-net

  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: always
    volumes:
      - ./telegram_bot.py:/app/telegram_bot.py
      - ./.env:/app/.env
    networks:
      - axyntrax-net
    depends_on:
      - core_api
      - hud

networks:
  axyntrax-net:
    driver: bridge
