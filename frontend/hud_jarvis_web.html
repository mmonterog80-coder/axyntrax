<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JARVIS AX — AXYNTRAX</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #00d4ff; --orange: #ff6b00; --purple: #7b2fff;
      --green: #00ff88; --bg: #03020f; --panel: rgba(0,212,255,0.05);
      --border: rgba(0,212,255,0.22);
    }
    body { background: var(--bg); color: #c0e8ff; font-family: 'Share Tech Mono', monospace; height: 100vh; overflow: hidden; }
    canvas#bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    #app {
      position: relative; z-index: 10; height: 100vh;
      display: grid;
      grid-template-rows: 58px 1fr 90px;
      grid-template-columns: 270px 1fr 280px;
      gap: 10px; padding: 10px;
    }

    /* HEADER */
    header {
      grid-column: 1/-1; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 8px;
    }
    .logo { font-family:'Orbitron',sans-serif; font-weight:900; font-size:22px; color:var(--cyan);
      text-shadow:0 0 20px var(--cyan); letter-spacing:4px; animation: glitch 6s infinite; }
    .logo span { color:var(--orange); }
    @keyframes glitch {
      0%,95%,100%{text-shadow:0 0 20px var(--cyan);}
      96%{text-shadow:-3px 0 var(--orange),3px 0 var(--cyan);}
      98%{text-shadow:3px 0 var(--purple),-3px 0 var(--cyan);}
    }
    #clock { font-family:'Orbitron',sans-serif; font-size:18px; color:var(--cyan); text-shadow:0 0 12px var(--cyan); }
    .status-dot { display:flex; align-items:center; gap:8px; font-size:12px; }
    .dot { width:8px; height:8px; border-radius:50%; animation:pulse 1.5s infinite; }
    .dot.green { background:var(--green); box-shadow:0 0 8px var(--green); color:var(--green); }
    .dot.red   { background:#ff4466; box-shadow:0 0 8px #ff4466; }
    @keyframes pulse {0%,100%{opacity:1}50%{opacity:0.3}}

    /* PANELES */
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:8px;
      padding:12px; backdrop-filter:blur(4px); display:flex; flex-direction:column; gap:8px; overflow:hidden; }
    .panel-title { font-family:'Orbitron',sans-serif; font-size:10px; letter-spacing:3px;
      color:var(--cyan); text-transform:uppercase; border-bottom:1px solid var(--border); padding-bottom:5px; }

    /* MÉTRICAS */
    .metric { display:flex; flex-direction:column; gap:3px; }
    .metric-label { font-size:11px; color:#88aacc; display:flex; justify-content:space-between; }
    .bar-track { height:5px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:3px; transition:width 0.6s ease; }
    .bar-cpu { background:linear-gradient(90deg,var(--cyan),var(--purple)); box-shadow:0 0 6px var(--cyan); }
    .bar-ram { background:linear-gradient(90deg,var(--orange),#ff2266); box-shadow:0 0 6px var(--orange); }
    .bar-net { background:linear-gradient(90deg,var(--green),var(--cyan)); }

    /* RADAR */
    #center { display:flex; align-items:center; justify-content:center; }
    canvas#radar { border-radius:50%; box-shadow:0 0 50px rgba(0,212,255,0.18); }

    /* CONSOLA */
    #console-box { flex:1; overflow-y:auto; font-size:12px; line-height:1.7; }
    #console-box::-webkit-scrollbar { width:3px; }
    #console-box::-webkit-scrollbar-thumb { background:var(--border); }
    .log-line { padding:1px 0; border-bottom:1px solid rgba(255,255,255,0.025); word-break:break-word; }
    .log-line.ok   { color:var(--green); }
    .log-line.err  { color:#ff4466; }
    .log-line.info { color:var(--cyan); }
    .log-line.ai   { color:#ffcc00; }
    .log-line.file { color:#cc88ff; }

    /* TAREAS */
    .task-item { font-size:11px; padding:5px 7px; border-radius:4px; margin-bottom:4px;
      border-left:3px solid var(--cyan); background:rgba(0,212,255,0.04); }
    .task-item.pending   { border-color:var(--orange); }
    .task-item.completed { border-color:var(--green); }
    .task-item.failed    { border-color:#ff2266; }

    /* FOOTER */
    footer {
      grid-column:1/-1; display:flex; align-items:center; gap:8px;
      background:rgba(0,212,255,0.04); border:1px solid var(--border);
      border-radius:8px; padding:8px 12px;
    }
    #prompt-label { font-family:'Orbitron',sans-serif; font-size:10px; color:var(--cyan); letter-spacing:2px; white-space:nowrap; }
    #cmd-input {
      flex:1; background:transparent; border:none; color:#fff;
      font-family:'Share Tech Mono',monospace; font-size:15px; outline:none;
    }
    #cmd-input::placeholder { color:rgba(0,212,255,0.3); }

    /* CLIP BUTTON */
    #clip-btn {
      background:none; border:1px solid var(--border); border-radius:6px;
      color:var(--cyan); cursor:pointer; padding:8px 10px; font-size:18px;
      transition:all 0.2s; position:relative;
    }
    #clip-btn:hover { background:rgba(0,212,255,0.1); border-color:var(--cyan); box-shadow:0 0 12px rgba(0,212,255,0.3); }
    #file-input { display:none; }

    /* Badge de archivo adjunto */
    #attach-badge {
      display:none; align-items:center; gap:5px; background:rgba(123,47,255,0.2);
      border:1px solid var(--purple); border-radius:5px; padding:4px 8px;
      font-size:11px; color:#cc88ff; max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    #attach-badge button { background:none; border:none; color:#ff4466; cursor:pointer; font-size:14px; padding:0 2px; }

    #send-btn {
      background:linear-gradient(135deg,var(--cyan),var(--purple)); border:none;
      border-radius:6px; color:#fff; font-family:'Orbitron',sans-serif;
      font-size:11px; letter-spacing:2px; padding:10px 20px; cursor:pointer;
      transition:opacity 0.2s,transform 0.1s; white-space:nowrap;
    }
    #send-btn:hover { opacity:0.85; transform:scale(1.03); }
    #send-btn:disabled { opacity:0.5; cursor:wait; }

    .spinner { display:inline-block; width:12px; height:12px; border:2px solid rgba(255,255,255,0.2);
      border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* PREVIEW MODAL de archivo */
    #file-preview-modal {
      display:none; position:fixed; inset:0; z-index:100;
      background:rgba(3,2,15,0.92); backdrop-filter:blur(8px);
      align-items:center; justify-content:center; flex-direction:column; gap:16px;
    }
    #file-preview-modal.open { display:flex; }
    #preview-content { max-width:80vw; max-height:70vh; border:1px solid var(--border); border-radius:8px; overflow:auto; }
    #preview-content img { max-width:100%; border-radius:6px; }
    #preview-text { background:rgba(0,212,255,0.05); color:#c0e8ff; font-size:13px; padding:16px; border-radius:6px; white-space:pre-wrap; max-height:60vh; overflow:auto; min-width:400px; }
    #close-preview {
      background:none; border:1px solid var(--border); color:var(--cyan); border-radius:6px;
      padding:8px 24px; font-family:'Orbitron',sans-serif; font-size:11px; cursor:pointer; letter-spacing:2px;
    }
    #close-preview:hover { background:rgba(0,212,255,0.1); }
    #preview-filename { font-family:'Orbitron',sans-serif; font-size:13px; color:var(--cyan); letter-spacing:2px; }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- MODAL PREVIEW ARCHIVO -->
<div id="file-preview-modal">
  <div id="preview-filename">ARCHIVO ADJUNTO</div>
  <div id="preview-content"></div>
  <button id="close-preview" onclick="closePreview()">✕ CERRAR</button>
</div>

<div id="app">
  <!-- HEADER -->
  <header>
    <div class="logo">JARVIS <span>AX</span></div>
    <div id="clock">--:--:--</div>
    <div class="status-dot">
      <div class="dot green" id="sys-dot"></div>
      <span id="sys-label" style="color:var(--green)">SISTEMA ACTIVO</span>
    </div>
  </header>

  <!-- PANEL IZQ: SISTEMA + IAs -->
  <div class="panel">
    <div class="panel-title">⚡ Sistema</div>
    <div class="metric">
      <div class="metric-label"><span>CPU</span><span id="cpu-val">--</span></div>
      <div class="bar-track"><div class="bar-fill bar-cpu" id="cpu-bar" style="width:0%"></div></div>
    </div>
    <div class="metric">
      <div class="metric-label"><span>RAM</span><span id="ram-val">--</span></div>
      <div class="bar-track"><div class="bar-fill bar-ram" id="ram-bar" style="width:0%"></div></div>
    </div>
    <div class="metric">
      <div class="metric-label"><span>NET</span><span id="net-val">--</span></div>
      <div class="bar-track"><div class="bar-fill bar-net" id="net-bar" style="width:0%"></div></div>
    </div>

    <div class="panel-title" style="margin-top:4px;display:flex;justify-content:space-between;align-items:center">
      <span>🤖 IAs Activas</span>
      <button onclick="refreshAIs()" style="background:none;border:1px solid var(--border);color:var(--cyan);border-radius:4px;padding:1px 6px;font-size:10px;cursor:pointer;letter-spacing:1px">↻</button>
    </div>
    <div id="ai-list" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px">
      <div style="color:#88aacc;font-size:11px">Cargando IAs...</div>
    </div>

    <div class="panel-title" style="margin-top:4px">📋 Tareas</div>
    <div id="task-list" style="max-height:120px;overflow-y:auto"></div>
  </div>

  <!-- CENTRO: RADAR -->
  <div id="center">
    <canvas id="radar" width="300" height="300"></canvas>
  </div>

  <!-- PANEL DER: CONSOLA -->
  <div class="panel">
    <div class="panel-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>🖥️ Consola JARVIS</span>
      <button onclick="clearConsole()" style="background:none;border:none;color:#88aacc;cursor:pointer;font-size:11px">LIMPIAR</button>
    </div>
    <!-- Selector de IA preferida -->
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      <span style="font-size:10px;color:#88aacc;white-space:nowrap">🧠 IA:</span>
      <select id="ai-selector" style="flex:1;background:rgba(0,212,255,0.06);border:1px solid var(--border);color:#c0e8ff;border-radius:4px;font-size:11px;padding:3px 5px;font-family:inherit">
        <option value="">Auto (DeepSeek decide)</option>
      </select>
    </div>
    <div id="orch-status" style="font-size:11px;color:#88aacc">Verificando orquestador...</div>
    <div id="console-box" style="flex:1"></div>
  </div>

  <!-- FOOTER: INPUT + CLIP -->
  <footer>
    <div id="prompt-label">ORDEN //</div>
    <input type="file" id="file-input" accept="image/*,.pdf,.txt,.md,.json,.csv,.py,.cpp,.js,.html"
           onchange="handleFileSelect(this)"/>
    <button id="clip-btn" title="Adjuntar archivo" onclick="document.getElementById('file-input').click()">📎</button>
    <div id="attach-badge">
      <span id="attach-name">archivo.pdf</span>
      <button onclick="clearAttachment()" title="Quitar archivo">✕</button>
    </div>
    <input id="cmd-input" type="text" placeholder="Escribe tu orden, señor..." autocomplete="off"/>
    <button id="send-btn" onclick="sendCommand()">EJECUTAR</button>
  </footer>
</div>

<script>
// ─── CONFIG ───
const ORCH = window.location.protocol === "file:" ? "https://jarvis-ax-cloud-production.up.railway.app" : window.location.origin;
let attachedFile = null;
let attachedText = null;

// ─── RELOJ ───
setInterval(() => {
  const n = new Date();
  document.getElementById('clock').textContent =
    [n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
}, 1000);

// ─── FONDO PARTÍCULAS ───
(function(){
  const cv = document.getElementById('bg'), ctx = cv.getContext('2d');
  let W, H, pts = [];
  const resize = () => { W = cv.width = innerWidth; H = cv.height = innerHeight; };
  const mk = () => ({ x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-.5)*.4, vy:(Math.random()-.5)*.4, r:Math.random()*1.2+.4, a:Math.random()*.4+.1 });
  const init = () => { resize(); pts = Array.from({length:100},mk); };
  const draw = () => {
    ctx.clearRect(0,0,W,H);
    for(let p of pts){ p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(0,212,255,${p.a})`; ctx.fill(); }
    for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.hypot(dx,dy);
      if(d<90){ ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.strokeStyle=`rgba(0,212,255,${.07*(1-d/90)})`; ctx.lineWidth=.5; ctx.stroke(); }
    }
    requestAnimationFrame(draw);
  };
  window.addEventListener('resize',resize);
  init(); draw();
})();

// ─── RADAR ───
(function(){
  const cv = document.getElementById('radar'), ctx = cv.getContext('2d');
  const cx=150,cy=150,R=130; let angle=0, blips=[];
  const draw = () => {
    ctx.clearRect(0,0,300,300);
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fillStyle='rgba(0,20,40,0.9)'; ctx.fill();
    [35,70,100,130].forEach(r=>{ ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.strokeStyle='rgba(0,212,255,0.1)'; ctx.lineWidth=1; ctx.stroke(); });
    ctx.strokeStyle='rgba(0,212,255,0.08)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx-R,cy); ctx.lineTo(cx+R,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-R); ctx.lineTo(cx,cy+R); ctx.stroke();
    // Barrido
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,R,-Math.PI/2,-Math.PI/2+Math.PI*.6); ctx.closePath();
    ctx.fillStyle='rgba(0,212,255,0.06)'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-R);
    ctx.strokeStyle='rgba(0,212,255,0.85)'; ctx.lineWidth=2; ctx.shadowBlur=12; ctx.shadowColor='#00d4ff'; ctx.stroke();
    ctx.restore();
    // Blips
    blips.forEach(b=>{ b.alpha-=.007; if(b.alpha<=0)return; ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fillStyle=`rgba(0,255,136,${b.alpha})`; ctx.shadowBlur=8; ctx.shadowColor='#00ff88'; ctx.fill(); });
    blips = blips.filter(b=>b.alpha>0);
    // Logo
    ctx.shadowBlur=0; ctx.fillStyle='rgba(0,212,255,0.9)'; ctx.font='bold 12px Orbitron,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('JARVIS AX',cx,cy);
    angle+=.025;
    if(Math.random()<.04){ const a=Math.random()*Math.PI*2, r=Math.random()*R*.85; blips.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r,alpha:1}); }
    requestAnimationFrame(draw);
  };
  draw();
})();

// ─── MÉTRICAS SIMULADAS ───
let cpu=35, ram=52;
setInterval(()=>{
  cpu = Math.max(5,Math.min(95,cpu+(Math.random()-.5)*7));
  ram = Math.max(20,Math.min(88,ram+(Math.random()-.5)*2));
  document.getElementById('cpu-val').textContent = cpu.toFixed(1)+'%';
  document.getElementById('ram-val').textContent = ram.toFixed(1)+'%';
  document.getElementById('cpu-bar').style.width = cpu+'%';
  document.getElementById('ram-bar').style.width = ram+'%';
  const online = navigator.onLine;
  document.getElementById('net-val').textContent = online?'online':'offline';
  document.getElementById('net-bar').style.width = (online?100:0)+'%';
}, 2000);

// ─── CONSOLA ───
function log(text, type='info') {
  const box = document.getElementById('console-box');
  const el = document.createElement('div');
  el.className = `log-line ${type}`;
  const ts = new Date().toLocaleTimeString('es-MX',{hour12:false});
  el.textContent = `[${ts}] ${text}`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
  while(box.children.length > 300) box.removeChild(box.firstChild);
}
function clearConsole() { document.getElementById('console-box').innerHTML=''; log('Consola limpiada','info'); }

// ─── ORQUESTADOR + IAs STATUS ───
let isOrchOnline = null;

async function checkOrch() {
  const dot = document.getElementById('sys-dot');
  const lbl = document.getElementById('sys-label');
  const orch = document.getElementById('orch-status');
  const btn = document.getElementById('send-btn');
  const input = document.getElementById('cmd-input');

  try {
    const r = await fetch(`${ORCH}/health`, {signal: AbortSignal.timeout(2000)});
    await r.json();
    
    if (isOrchOnline !== true) {
      isOrchOnline = true;
      orch.innerHTML = `<span style="color:#00ff88">● ORQUESTADOR ONLINE</span>`;
      dot.className = 'dot green'; lbl.style.color='var(--green)'; lbl.textContent='ONLINE';
      btn.disabled = false;
      input.disabled = false;
      log('🟢 Conexión restablecida. JARVIS AX en línea y listo para recibir órdenes.', 'ok');
    }
  } catch(e) {
    if (isOrchOnline !== false) {
      isOrchOnline = false;
      orch.innerHTML = `<span style="color:#ff4466">● OFFLINE (Reconectando...)</span>`;
      dot.className = 'dot red'; lbl.style.color='#ff4466'; lbl.textContent='OFFLINE';
      btn.disabled = true;
      input.disabled = true;
      log('⚠️ Orquestador desconectado. Reintentando reconexión automáticamente cada 2 segundos...', 'err');
    }
  }
}

async function refreshAIs() {
  const aiList = document.getElementById('ai-list');
  const selector = document.getElementById('ai-selector');
  aiList.innerHTML = '<div style="color:#88aacc;font-size:11px">Escaneando IAs...</div>';
  try {
    const r = await fetch(`${ORCH}/ai/status`, {signal: AbortSignal.timeout(60000)});
    const data = await r.json();
    // Renderizar tarjetas de IAs
    aiList.innerHTML = Object.entries(data).map(([key, ai]) => {
      const online = ai.online;
      const color  = online ? '#00ff88' : '#ff4466';
      const bg     = online ? 'rgba(0,255,136,0.06)' : 'rgba(255,68,102,0.04)';
      const dot    = online ? '●' : '○';
      return `<div style="background:${bg};border:1px solid ${color}33;border-radius:5px;padding:6px 8px;cursor:pointer;transition:all 0.2s" onclick="selectAI('${key}','${ai.name}')" title="${ai.specialties.join(', ')}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:11px;color:#c0e8ff">${ai.name}</span>
          <span style="color:${color};font-size:12px">${dot}</span>
        </div>
        <div style="font-size:9px;color:#88aacc;margin-top:2px">${ai.specialties.slice(0,3).join(' · ')}</div>
        ${key==='deepseek'?'<div style="font-size:9px;color:#ffcc00;margin-top:2px">⭐ ORQUESTADOR MAESTRO</div>':''}
      </div>`;
    }).join('');
    // Actualizar selector desplegable
    const prevVal = selector.value;
    selector.innerHTML = '<option value="">🧠 Auto (DeepSeek decide)</option>' +
      Object.entries(data)
        .filter(([,ai]) => ai.online)
        .sort((a,b) => a[1].priority - b[1].priority)
        .map(([key,ai]) => `<option value="${key}">${ai.name}</option>`)
        .join('');
    if (prevVal) selector.value = prevVal;
    const online = Object.values(data).filter(a=>a.online).length;
    log(`🤖 IAs escaneadas: ${online}/${Object.keys(data).length} online`, 'ok');
  } catch(e) {
    aiList.innerHTML = '<div style="color:#ff4466;font-size:11px">Error al obtener estado de IAs</div>';
    log('No se pudo obtener estado de IAs: ' + e.message, 'err');
  }
}

function selectAI(key, name) {
  document.getElementById('ai-selector').value = key;
  log(`IA seleccionada manualmente: ${name}`, 'info');
}

checkOrch();
setInterval(checkOrch, 2000);
// Escanear IAs al inicio y cada 5 minutos
setTimeout(refreshAIs, 1000);
setInterval(refreshAIs, 300000);

// ─── ADJUNTAR ARCHIVO ───
function handleFileSelect(input) {
  const file = input.files[0];
  if (!file) return;
  attachedFile = file;
  document.getElementById('attach-name').textContent = file.name.length > 22 ? file.name.substring(0,20)+'…' : file.name;
  document.getElementById('attach-badge').style.display = 'flex';
  log(`📎 Archivo adjunto: ${file.name} (${(file.size/1024).toFixed(1)} KB)`, 'file');

  // Si es imagen, mostrar preview modal
  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = e => {
      attachedText = `[IMAGEN: ${file.name}]`;
      showPreview('img', e.target.result, file.name);
    };
    reader.readAsDataURL(file);
  } else {
    // Leer como texto (PDF, TXT, JSON, código...)
    const reader = new FileReader();
    reader.onload = e => {
      attachedText = e.target.result;
      showPreview('text', e.target.result.substring(0,3000), file.name);
    };
    reader.readAsText(file, 'utf-8');
  }
}

function showPreview(type, content, filename) {
  const modal = document.getElementById('file-preview-modal');
  const box   = document.getElementById('preview-content');
  document.getElementById('preview-filename').textContent = '📎 ' + filename;
  box.innerHTML = '';
  if (type === 'img') {
    const img = document.createElement('img');
    img.src = content;
    box.appendChild(img);
  } else {
    const pre = document.createElement('div');
    pre.id = 'preview-text';
    pre.textContent = content + (content.length >= 3000 ? '\n\n[... contenido truncado para preview ...]' : '');
    box.appendChild(pre);
  }
  modal.classList.add('open');
}
function closePreview() { document.getElementById('file-preview-modal').classList.remove('open'); }

function clearAttachment() {
  attachedFile = null; attachedText = null;
  document.getElementById('attach-badge').style.display = 'none';
  document.getElementById('file-input').value = '';
  log('Adjunto eliminado', 'info');
}

// ─── ENVIAR COMANDO ───
const tasks = [];
function addTask(id, status, label) {
  tasks.unshift({id, status, label});
  const el = document.getElementById('task-list');
  el.innerHTML = tasks.slice(0,8).map(t=>`
    <div class="task-item ${t.status}">
      <div style="color:#88aacc;font-size:10px">${t.id?t.id.substring(0,8):'???'}…</div>
      <div style="margin:2px 0">${t.label}</div>
      <div style="color:${t.status==='completed'?'#00ff88':t.status==='failed'?'#ff4466':'#ff6b00'};font-size:10px">${t.status.toUpperCase()}</div>
    </div>`).join('');
}

async function playVoice(text) {
  try {
    const r = await fetch(`${ORCH}/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (r.ok) {
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.play();
    } else {
      console.error("Error TTS:", await r.text());
    }
  } catch(e) { console.error("Error llamando a TTS:", e); }
}

async function sendCommand() {
  const input = document.getElementById('cmd-input');
  let cmd = input.value.trim();
  if (!cmd && !attachedFile) return;

  let fullObjective = cmd || '';
  if (attachedText && !attachedText.startsWith('[IMAGEN:')) {
    fullObjective += (cmd ? '\n\nCONTENIDO DEL ARCHIVO ADJUNTO:\n' : 'Analiza este archivo:\n') + attachedText.substring(0,4000);
  } else if (attachedText) {
    fullObjective += (cmd ? ' ' : '') + attachedText;
  }

  const displayCmd = cmd || `[Archivo: ${attachedFile?.name}]`;
  const preferredAI = document.getElementById('ai-selector').value || null;
  input.value = '';
  log(`>> ${displayCmd}${preferredAI ? ' [→ '+preferredAI+']' : ' [→ DeepSeek decide]'}`, 'info');

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const payload = {
      session_id: crypto.randomUUID(),
      origin: "hud_web",
      preferred_api: preferredAI,
      task: {
        phase: 1, module: "hud", action_type: "execute",
        objective: fullObjective || 'Saluda al usuario',
        context: { model_preference: preferredAI || "auto", files_allowed: [], risk_level: "low" }
      }
    };

    const r = await fetch(`${ORCH}/tasks/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: AbortSignal.timeout(90000)
    });

    if (r.ok) {
      const data = await r.json();
      const plan = data.plan || 'Sin respuesta';
      log(plan, 'ai');
      addTask(data.task_id, 'pending', displayCmd.substring(0,45));
      clearAttachment();
      playVoice(plan); // REPRODUCIR VOZ
    } else {
      const errText = await r.text();
      log(`[HTTP ${r.status}]: ${errText}`, 'err');
    }
  } catch(e) {
    log('[Error]: ' + e.message, 'err');
    log('Verifica que uvicorn esté corriendo en puerto 8000', 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'EJECUTAR';
  }
}

document.getElementById('cmd-input').addEventListener('keydown', e => { if(e.key==='Enter') sendCommand(); });

log('Escaneando IAs disponibles...', 'file');
</script>
