<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z.IA | Master Orchestrator HUD</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for futuristic look -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- Background 3D Canvas -->
    <canvas id="bg-canvas"></canvas>

    <div class="hud-container">
        <!-- Top Header -->
        <header class="hud-header">
            <div class="brand">
                <h1>Z.IA</h1>
                <span class="subtitle">ORQUESTADORA MAESTRA // RED ACTIVA</span>
            </div>
            <div class="sys-status">
                <div class="status-indicator online"></div>
                <span>SISTEMA EN LÍNEA</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="hud-main">
            <!-- Left Panel: AI Swarm Status -->
            <aside class="panel left-panel">
                <div class="panel-header">ENJAMBRE DE IA</div>
                <div class="ai-list" id="ai-nodes">
                    <!-- Injected by JS -->
                </div>
            </aside>

            <!-- Center: 3D Hologram / Core -->
            <section class="core-section">
                <div class="hologram-container">
                    <div class="ring ring-1"></div>
                    <div class="ring ring-2"></div>
                    <div class="ring ring-3"></div>
                    <div class="core-orb">Z.IA</div>
                </div>
                <div class="core-data">
                    <p>ANALIZANDO TELEMETRÍA...</p>
                    <div class="data-bar"><div class="fill"></div></div>
                </div>
            </section>

            <!-- Right Panel: Communication Terminal -->
            <aside class="panel right-panel">
                <div class="panel-header">TERMINAL DE ENLACE</div>
                <div class="chat-window" id="chat-window">
                    <div class="message system">
                        [Z.IA] Conexión establecida. Enjambre orquestado y listo para recibir órdenes, señor.
                    </div>
                </div>
                <div class="chat-input-container">
                    <input type="text" id="chat-input" placeholder="INGRESE COMANDO A Z.IA..." autocomplete="off">
                    <button id="send-btn">ENVIAR</button>
                </div>
            </aside>
        </main>
        
        <!-- Bottom Footer -->
        <footer class="hud-footer">
            <div class="data-stream">01001010 01000001 01010010 01010110 01001001 01010011 -> Z.IA PROTOCOL OVERRIDE</div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
