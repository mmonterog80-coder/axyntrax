<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>JARVIS AX - Consola de Acciones</title>
<style>
body { background:#0a0f1e; color:#0ef; font-family:monospace; padding:20px; }
#log { background:#010a12; height:80vh; overflow-y:auto; border:1px solid #0ef; padding:10px; }
.action { color:#ffaa55; }
.result { color:#88ff88; margin-left:20px; }
.time { color:#888; }
</style>
</head>
<body>
<h2>JARVIS AX - Consola de Actividad Física</h2>
<div id="log"></div>
<script>
const ws = new WebSocket('ws://localhost:8000/ws');
ws.onmessage = (event) => {
    const div = document.createElement('div');
    div.innerHTML = `<span class="time">[${new Date().toLocaleTimeString()}]</span> <span class="action">${event.data}</span>`;
    document.getElementById('log').appendChild(div);
};
ws.onerror = () => { addLog("❌ WebSocket no conectado. Asegúrate de que el orquestador tenga soporte WS."); };
function addLog(msg) { const div = document.createElement('div'); div.innerHTML = msg; document.getElementById('log').appendChild(div); }
</script>
</body>
</html>
